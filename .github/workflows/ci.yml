name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run Node checks
        run: npm test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Streamlit app
        run: python -m py_compile python_streamlit/app.py

      - name: Run Python smoke test
        run: python python_streamlit/app.py --smoke-test
