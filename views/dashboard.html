<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helmet Detection Dashboard</title>
    <link rel="stylesheet" href="/static/dashboard_style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-title">Helmet Detection</div>
        <a class="logout-link" href="/route/logout">Logout</a>
    </aside>

    <main class="content">
        <header class="dashboard-header">
            <p class="eyebrow">Road safety monitoring</p>
            <h1>Helmet Violation Detection Dashboard</h1>
            <p>Select a camera location and open the Streamlit detection workflow.</p>
        </header>

        <section class="city-grid" aria-label="Monitoring locations">
            <article class="city-card">
                <img src="/static/assets/patiala.jpg" alt="Patiala traffic location">
                <div class="city-card-content">
                    <h2>Patiala</h2>
                    <label for="patiala-area">Area</label>
                    <select id="patiala-area" name="patiala-area">
                        <option>Urban road sample</option>
                        <option>Market road sample</option>
                    </select>
                    <a class="monitor-link" href="http://localhost:8501" target="_blank" rel="noreferrer">Start Monitoring</a>
                </div>
            </article>

            <article class="city-card">
                <img src="/static/assets/jalandhar.jpg" alt="Jalandhar traffic location">
                <div class="city-card-content">
                    <h2>Jalandhar</h2>
                    <label for="jalandhar-area">Area</label>
                    <select id="jalandhar-area" name="jalandhar-area">
                        <option>Urban road sample</option>
                        <option>Junction sample</option>
                    </select>
                    <a class="monitor-link" href="http://localhost:8501" target="_blank" rel="noreferrer">Start Monitoring</a>
                </div>
            </article>

            <article class="city-card">
                <img src="/static/assets/ludhiana.jpeg" alt="Ludhiana traffic location">
                <div class="city-card-content">
                    <h2>Ludhiana</h2>
                    <label for="ludhiana-area">Area</label>
                    <select id="ludhiana-area" name="ludhiana-area">
                        <option>Urban road sample</option>
                        <option>Highway sample</option>
                    </select>
                    <a class="monitor-link" href="http://localhost:8501" target="_blank" rel="noreferrer">Start Monitoring</a>
                </div>
            </article>

            <article class="city-card">
                <img src="/static/assets/amritsar.jpg" alt="Amritsar traffic location">
                <div class="city-card-content">
                    <h2>Amritsar</h2>
                    <label for="amritsar-area">Area</label>
                    <select id="amritsar-area" name="amritsar-area">
                        <option>Urban road sample</option>
                        <option>Checkpoint sample</option>
                    </select>
                    <a class="monitor-link" href="http://localhost:8501" target="_blank" rel="noreferrer">Start Monitoring</a>
                </div>
            </article>

            <article class="city-card">
                <img src="/static/assets/ropar.webp" alt="Ropar traffic location">
                <div class="city-card-content">
                    <h2>Ropar</h2>
                    <label for="ropar-area">Area</label>
                    <select id="ropar-area" name="ropar-area">
                        <option>Urban road sample</option>
                        <option>Bridge road sample</option>
                    </select>
                    <a class="monitor-link" href="http://localhost:8501" target="_blank" rel="noreferrer">Start Monitoring</a>
                </div>
            </article>
        </section>
    </main>
</body>
</html>
